<header>
  <icon
        [icon]="{
            type: 'icon',
            class: 'material-symbols-rounded',
            content: 'people_outline',
        }"
  ></icon>
  <h1>Attendees</h1>
</header>
<mat-dialog-content>
  <div class="body">
    @for (item of attendees; track item) {
      <div>
        <icon
                [icon]="{
                    type: 'icon',
                    class: 'material-symbols-rounded',
                    content: 'perm_identity',
                }"
        ></icon>
        <label>{{ item.name }}</label>
        <a href="mailto:{{ item.email }}">{{ item.email }}</a>
      </div>
    }
  </div>
</mat-dialog-content>
<mat-dialog-actions>
  <footer>
    <button btn matRipple class="inverse" mat-dialog-close>Close</button>
  </footer>
</mat-dialog-actions>
